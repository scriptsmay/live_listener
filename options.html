<!doctype html>
<html>
  <head>
    <title>设置</title>
    <meta charset="UTF-8" />
    <style>
      :root {
        --primary: #ff8c00;
        --primary-light: #ffa500;
        --primary-dark: #e67e00;
        --gray-50: #f9fafb;
        --gray-100: #f3f4f6;
        --gray-200: #e5e7eb;
        --gray-400: #9ca3af;
        --gray-600: #4b5563;
        --gray-800: #1f2937;
        --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.05);
        --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
      }

      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        font-family:
          -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto,
          'Helvetica Neue', Arial, sans-serif;
        padding: 0;
        margin: 0;
        min-height: 100vh;
      }

      #app {
        max-width: 720px;
        margin: 0 auto;
        background: rgba(255, 255, 255, 0.98);
        backdrop-filter: blur(10px);
        border-radius: 24px;
        padding: 40px;
        box-shadow: 0 20px 40px rgba(0, 0, 0, 0.15);
      }

      .header {
        font-weight: 700;
        font-size: 24px;
        padding-bottom: 20px;
        margin-bottom: 32px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        border-bottom: 2px solid var(--gray-100);
        color: var(--gray-800);
      }

      .env-card {
        background: #fff;
        border: 2px solid var(--gray-100);
        border-radius: 16px;
        padding: 24px;
        margin-bottom: 20px;
        transition: all 0.3s;
        box-shadow: var(--shadow-sm);
      }

      .env-card:hover {
        border-color: var(--primary);
        box-shadow: var(--shadow-md);
      }

      .env-card.production {
        border-color: var(--primary);
      }

      .env-card.development {
        border-color: #00bfff;
      }

      .env-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 20px;
      }

      .env-title {
        font-weight: 700;
        font-size: 18px;
        color: var(--gray-800);
      }

      .env-toggle {
        display: flex;
        align-items: center;
        gap: 10px;
        cursor: pointer;
      }

      .env-toggle label {
        font-size: 14px;
        color: var(--gray-600);
        font-weight: 500;
      }

      .env-toggle input[type='checkbox'] {
        width: 20px;
        height: 20px;
        cursor: pointer;
        accent-color: var(--primary);
      }

      .env-field {
        margin-bottom: 18px;
      }

      .env-field:last-child {
        margin-bottom: 0;
      }

      .env-field label {
        font-size: 15px;
        color: var(--gray-600);
        font-weight: 500;
        display: block;
        margin-bottom: 8px;
      }

      .env-field input {
        width: 100%;
        box-sizing: border-box;
        border: 2px solid var(--gray-200);
        padding: 12px 16px;
        border-radius: 12px;
        font-size: 15px;
        transition: all 0.3s;
      }

      .env-field input:focus {
        outline: none;
        border-color: var(--primary);
        box-shadow: 0 0 0 3px rgba(255, 140, 0, 0.1);
      }

      .btn-send {
        background: linear-gradient(
          135deg,
          var(--primary) 0%,
          var(--primary-dark) 100%
        );
        color: white;
        border: none;
        width: 100%;
        padding: 16px 24px;
        border-radius: 14px;
        font-weight: 700;
        font-size: 17px;
        cursor: pointer;
        transition: all 0.3s;
        margin-top: 12px;
      }

      .btn-send:hover {
        transform: translateY(-2px);
        box-shadow: 0 8px 20px rgba(255, 140, 0, 0.35);
      }

      .btn-send:active {
        transform: translateY(0);
      }

      .btn-send:disabled {
        background: var(--gray-400);
        cursor: not-allowed;
        transform: none;
        box-shadow: none;
      }

      textarea {
        border: 2px solid var(--gray-200);
        width: 100%;
        padding: 16px;
        border-radius: 12px;
        resize: vertical;
        font-family:
          -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, monospace;
        font-size: 15px;
        box-sizing: border-box;
        transition: all 0.3s;
        line-height: 1.6;
        min-height: 140px;
      }

      textarea:focus {
        outline: none;
        border-color: var(--primary);
        box-shadow: 0 0 0 3px rgba(255, 140, 0, 0.1);
      }

      .section {
        margin-bottom: 24px;
      }

    </style>
  </head>
  <body>
    <div id="app">
      <h3 class="header">多环境配置</h3>
      <div id="envContainer"></div>
      <button id="save" class="btn-send">保存设置</button>
    </div>
    <script type="module" src="options.js"></script>
  </body>
</html>
