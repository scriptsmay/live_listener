<!doctype html>
<html>
  <head>
    <title>设置</title>
    <meta charset="UTF-8" />
    <style>
      body {
        font-family: sans-serif;
        padding: 10px;
        margin: 0;
      }
      .header {
        font-weight: bold;
        border-bottom: 1px solid #eee;
        padding-bottom: 8px;
        margin-bottom: 10px;
        display: flex;
        justify-content: space-between;
      }
      button {
        cursor: pointer;
        border: none;
        border-radius: 4px;
        padding: 5px 10px;
        font-size: 12px;
      }
      input {
        border: 1px solid #eee;
        width: 320px;
        padding: 5px;
        border-radius: 4px;
      }
      .env-card {
        background: #fff;
        border: 1px solid #ddd;
        border-radius: 8px;
        padding: 12px;
        margin-bottom: 12px;
      }
      .env-card.production {
        border-color: #ff8c00;
      }
      .env-card.development {
        border-color: #00bfff;
      }
      .env-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 8px;
      }
      .env-title {
        font-weight: bold;
        font-size: 14px;
      }
      .env-toggle {
        display: flex;
        align-items: center;
        gap: 6px;
      }
      .env-field {
        margin-bottom: 6px;
      }
      .env-field label {
        font-size: 12px;
        color: #666;
      }
      .env-field input {
        width: 100%;
        box-sizing: border-box;
        margin-top: 2px;
      }

      .btn-send {
        background: #ff8c00;
        color: white;
        border: none;
        width: auto;
        padding: 8px 10px;
        border-radius: 6px;
        font-weight: bold;
        cursor: pointer;
      }
      .btn-send:hover {
        background: #ffa500;
      }
      .btn-send:disabled {
        background: #ccc;
      }
      textarea {
        border: 1px solid #eee;
        width: 100%;
        padding: 5px;
        border-radius: 4px;
        resize: vertical;
        font-family: sans-serif;
        font-size: 12px;
        box-sizing: border-box;
      }
      .section {
        margin-bottom: 16px;
      }
      .shared-section {
        border: 1px solid #eee;
        border-radius: 8px;
        padding: 12px;
        margin-bottom: 12px;
      }
    </style>
  </head>
  <body>
    <h3 class="header">多环境配置</h3>
    <div id="envContainer"></div>
    <div class="shared-section">
      <label>关注的主播（每行一个，所有环境共用）：<br />
        <textarea id="followedAuthors" rows="5" placeholder="KSG无言"></textarea>
      </label>
    </div>
    <button id="save" class="btn-send">保存设置</button>
    <script type="module" src="options.js"></script>
  </body>
</html>
