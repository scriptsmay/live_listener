<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <style>
      :root {
        --primary: #ff8c00;
        --primary-light: #ffa500;
        --primary-dark: #e67e00;
        --success: #4CAF50;
        --bg-1: #fffaf5;
        --bg-2: #fff3e6;
        --gray-50: #f9fafb;
        --gray-100: #f3f4f6;
        --gray-200: #e5e7eb;
        --gray-400: #9ca3af;
        --gray-600: #4b5563;
        --gray-800: #1f2937;
        --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.08);
        --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
      }

      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        width: 680px;
        min-height: 480px;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
        background: linear-gradient(135deg, var(--bg-1) 0%, var(--bg-2) 100%);
        padding: 0;
        margin: 0;
      }

      .container {
        display: flex;
        padding: 20px;
        gap: 20px;
        min-height: 480px;
      }

      .left-panel {
        flex: 1;
        display: flex;
        flex-direction: column;
      }

      .right-panel {
        width: 200px;
        flex-shrink: 0;
      }

      .streams-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 16px;
        padding: 0 4px;
      }

      .streams-title {
        font-size: 16px;
        font-weight: 700;
        color: var(--gray-800);
        display: flex;
        align-items: center;
        gap: 8px;
      }

      .badge {
        background: var(--primary);
        color: white;
        padding: 4px 10px;
        border-radius: 20px;
        font-size: 12px;
        font-weight: 700;
      }

      .btn-clear {
        background: white;
        color: var(--gray-800);
        border: 2px solid var(--gray-200);
        padding: 8px 16px;
        border-radius: 10px;
        font-size: 13px;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.3s;
      }

      .btn-clear:hover {
        border-color: var(--primary);
        color: var(--primary);
        transform: translateY(-1px);
        box-shadow: 0 4px 12px rgba(255, 140, 0, 0.15);
      }

      .streams-list {
        display: flex;
        flex-direction: column;
        gap: 12px;
        flex: 1;
        overflow-y: auto;
        max-height: 400px;
      }

      .stream-item {
        background: white;
        border: 2px solid var(--gray-100);
        border-radius: 16px;
        padding: 16px;
        box-shadow: var(--shadow-md);
        transition: all 0.3s;
      }

      .stream-item:hover {
        transform: translateY(-2px);
        box-shadow: var(--shadow-lg);
        border-color: var(--primary);
      }

      .stream-meta {
        display: flex;
        align-items: center;
        gap: 10px;
        margin-bottom: 12px;
      }

      .quality-tag {
        color: white;
        font-size: 11px;
        padding: 4px 10px;
        border-radius: 20px;
        font-weight: 700;
      }

      .stream-type {
        font-size: 11px;
        color: var(--gray-600);
        background: var(--gray-100);
        padding: 4px 8px;
        border-radius: 6px;
        font-weight: 600;
      }

      .url-display {
        font-size: 11px;
        color: var(--gray-600);
        word-break: break-all;
        display: -webkit-box;
        -webkit-line-clamp: 2;
        line-clamp: 2;
        -webkit-box-orient: vertical;
        overflow: hidden;
        margin-bottom: 12px;
        background: var(--gray-50);
        padding: 8px;
        border-radius: 8px;
        font-family: 'Monaco', 'Menlo', monospace;
      }

      .btn-send {
        background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
        color: white;
        border: none;
        width: 100%;
        padding: 12px 16px;
        border-radius: 10px;
        font-weight: 700;
        font-size: 14px;
        cursor: pointer;
        transition: all 0.3s;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
      }

      .btn-send:hover:not(:disabled) {
        transform: translateY(-2px);
        box-shadow: 0 6px 20px rgba(255, 140, 0, 0.4);
      }

      .btn-send:active:not(:disabled) {
        transform: translateY(0);
      }

      .btn-send:disabled {
        background: linear-gradient(135deg, var(--success) 0%, #45a049 100%);
        cursor: not-allowed;
      }

      .empty-state {
        background: rgba(255, 255, 255, 0.7);
        border: 2px dashed var(--gray-200);
        border-radius: 16px;
        padding: 40px;
        text-align: center;
        color: var(--gray-400);
        flex: 1;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
      }

      .empty-icon {
        font-size: 48px;
        margin-bottom: 16px;
      }

      .empty-text {
        font-size: 14px;
        font-weight: 500;
      }

      .status-card {
        background: white;
        border: 2px solid var(--gray-100);
        border-radius: 20px;
        padding: 24px 20px;
        box-shadow: var(--shadow-lg);
        text-align: center;
        position: sticky;
        top: 0;
      }

      .status-title {
        font-size: 14px;
        color: var(--gray-600);
        margin-bottom: 20px;
        font-weight: 700;
        letter-spacing: 0.5px;
      }

      .toggle-button {
        position: relative;
        width: 80px;
        height: 80px;
        border-radius: 50%;
        border: none;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 32px;
        transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        box-shadow: 0 6px 20px rgba(0, 0, 0, 0.1);
        margin: 0 auto 16px;
      }

      .toggle-button.off {
        background: linear-gradient(135deg, var(--gray-100) 0%, var(--gray-200) 100%);
        color: var(--gray-600);
      }

      .toggle-button.on {
        background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
        color: white;
        animation: pulse-ring 2s infinite;
      }

      @keyframes pulse-ring {
        0% {
          box-shadow: 0 0 0 0 rgba(255, 140, 0, 0.3);
        }
        70% {
          box-shadow: 0 0 0 15px rgba(255, 140, 0, 0);
        }
        100% {
          box-shadow: 0 0 0 0 rgba(255, 140, 0, 0);
        }
      }

      .toggle-button:hover {
        transform: scale(1.05);
      }

      .toggle-button:active {
        transform: scale(0.95);
      }

      .status-text {
        font-size: 16px;
        font-weight: 700;
        transition: color 0.3s;
        margin-bottom: 4px;
      }

      .status-text.on {
        color: var(--primary);
      }

      .status-text.off {
        color: var(--gray-400);
      }

      .status-detail {
        font-size: 11px;
        color: var(--gray-400);
        margin-bottom: 20px;
      }

      .info-section {
        border-top: 1px solid var(--gray-100);
        padding-top: 16px;
      }

      .info-item {
        margin-bottom: 12px;
      }

      .info-item:last-child {
        margin-bottom: 0;
      }

      .info-label {
        font-size: 10px;
        color: var(--gray-400);
        text-transform: uppercase;
        letter-spacing: 0.5px;
        margin-bottom: 4px;
        text-align: left;
        font-weight: 600;
      }

      .info-value {
        font-size: 12px;
        font-weight: 600;
        color: var(--gray-800);
        word-break: break-all;
        text-align: left;
      }

      .hidden {
        display: none;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="left-panel">
        <div class="streams-header">
          <div class="streams-title">
            📺 检测到的直播流
            <span class="badge" id="streamCount">0</span>
          </div>
          <button class="btn-clear" id="clearBtn">清空列表</button>
        </div>

        <div class="streams-list" id="streamsContainer">
          <div class="empty-state" id="emptyState">
            <div class="empty-icon">🔍</div>
            <div class="empty-text">暂无检测到的直播流</div>
          </div>
          <div id="list"></div>
        </div>
      </div>

      <div class="right-panel">
        <div class="status-card">
          <div class="status-title">🎙️ 后台监听</div>
          <button class="toggle-button off" id="toggleButton" title="点击切换状态">
            <span id="toggleIcon">📹</span>
          </button>
          <div class="status-text off" id="statusText">已停用</div>
          <div class="status-detail" id="statusDetail">点击按钮启用</div>

          <div class="info-section">
            <div class="info-item">
              <div class="info-label">上次请求时间</div>
              <div class="info-value" id="lastReqTime">--</div>
            </div>
            <div class="info-item">
              <div class="info-label">上次请求结果</div>
              <div class="info-value" id="lastResult">--</div>
            </div>
          </div>
        </div>
      </div>
    </div>
    <script type="module" src="popup.js"></script>
  </body>
</html>
