<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <style>
      body {
        width: 400px;
        font-family: sans-serif;
        padding: 10px;
        margin: 0;
      }
      #notice-content {
        font-size: 12px;
        margin-bottom: 20px;
      }
      .header {
        font-weight: bold;
        border-bottom: 1px solid #eee;
        padding-bottom: 8px;
        margin-bottom: 10px;
        display: flex;
        justify-content: space-between;
      }
      button {
        cursor: pointer;
        border: none;
        border-radius: 4px;
        padding: 5px 10px;
        font-size: 12px;
      }
      .btn-clear {
        background: #eee;
        font-size: 10px;
      }
      .toggle-label {
        font-size: 12px;
        display: flex;
        align-items: center;
        gap: 4px;
        cursor: pointer;
        user-select: none;
      }
      .toggle-label input {
        width: auto;
        cursor: pointer;
      }
      .stream-item {
        background: #fff;
        border: 1px solid #ff8c00;
        border-radius: 8px;
        padding: 12px;
        margin-bottom: 10px;
        transition: box-shadow 0.2s;
      }

      .stream-item:hover {
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
      }

      .stream-info {
        display: flex;
        align-items: center;
        gap: 8px;
        margin-bottom: 8px;
      }

      .quality-tag {
        color: white;
        font-size: 12px;
        padding: 2px 6px;
        border-radius: 4px;
        font-weight: bold;
      }

      .stream-type {
        font-size: 12px;
        color: #888;
        background: #f0f0f0;
        padding: 2px 4px;
        border-radius: 2px;
      }

      .url-display {
        font-size: 11px;
        color: #666;
        word-break: break-all;
        display: -webkit-box;
        -webkit-line-clamp: 3; /* 最多显示三行 */
        line-clamp: 3;
        -webkit-box-orient: vertical;
        overflow: hidden;
        margin-bottom: 10px;
        background: #f8f8f8;
        padding: 4px;
        border-radius: 4px;
      }

      .btn-send {
        background: #ff8c00;
        color: white;
        border: none;
        width: auto;
        padding: 8px 10px;
        border-radius: 6px;
        font-weight: bold;
        cursor: pointer;
      }
      .btn-send:hover {
        background: #ffa500;
      }

      .btn-send:disabled {
        background: #ccc;
      }
    </style>
  </head>
  <body>
    <div id="notice">
      <div class="header">
        后台监听状态<span id="status"
          ><label class="toggle-label">
            <input type="checkbox" id="monitorToggle" /> 启用
          </label></span
        >
      </div>
      <div id="notice-content">
        <div>上次请求时间：<span id="lastReqTime"></span></div>
        <div>上次请求结果：<span id="lastResult"></span></div>
      </div>
    </div>
    <div class="header">
      <span>检测到的直播流</span>
      <div style="display: flex; gap: 8px; align-items: center">
        <button class="btn-clear" id="clearBtn">清空</button>
      </div>
    </div>
    <div id="list"></div>
    <script type="module" src="popup.js"></script>
  </body>
</html>
