<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <style>
      body {
        width: 300px;
        font-family: sans-serif;
        padding: 10px;
        margin: 0;
      }
      .header {
        font-weight: bold;
        border-bottom: 1px solid #eee;
        padding-bottom: 8px;
        margin-bottom: 10px;
        display: flex;
        justify-content: space-between;
      }
      .stream-item {
        font-size: 11px;
        background: #f9f9f9;
        padding: 8px;
        margin-bottom: 8px;
        border-radius: 4px;
        border: 1px solid #eee;
      }
      .url {
        word-break: break-all;
        color: #666;
        margin-bottom: 8px;
        max-height: 35px;
        overflow: hidden;
      }
      button {
        cursor: pointer;
        border: none;
        border-radius: 4px;
        padding: 5px 10px;
      }
      .btn-send {
        background: #ff5000;
        color: white;
        width: 100%;
      }
      .btn-clear {
        background: #eee;
        font-size: 10px;
      }
    </style>
  </head>
  <body>
    <div class="header">
      <span>检测到的直播流</span>
      <button class="btn-clear" id="clearBtn">清空</button>
    </div>
    <div id="list"></div>
    <script src="popup.js"></script>
  </body>
</html>
